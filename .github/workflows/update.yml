name: JDiDev7 Price Autoupdate
on:
  schedule:
    - cron: '0 0 * * 1' # Se ejecuta cada lunes
  workflow_dispatch: # Permite ejecutarlo a mano

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Ejecutar Scraper
        run: python scraper.py

      - name: Guardar cambios en el Repo
        run: |
          git config --global user.name 'JDiDev7-Bot'
          git config --global user.email 'bot@jdi-dev.com'
          git add prices.json
          git commit -m "🤖 Bot: Modelos actualizados JDiDev7" || echo "Sin cambios"
          git push
